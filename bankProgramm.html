<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<style>
    * {
        box-sizing: border-box;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: white;
        background-size: cover;
        background-position: top;
        background-repeat: no-repeat;

    }

    .loginCT {
        position: relative;
        width: 480px;
        height: 90vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 1em;
        background-color: rgba(255, 255, 255, 0.925);
        backdrop-filter: blur(10px);
        border-radius: 42px;
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
        box-shadow: 0px 0px 10px 0px black;
        font-family: Arial, Helvetica, sans-serif;
    }

    h1 {
        text-align: center;
        color: rgb(0, 0, 0);
        font-weight: bolder;
    }

    p {
        font-size: 1.2em;
        font-family: sans-serif;
        color: rgb(137, 18, 228);
        font-size: 1em;
        font-weight: bold;

    }

    form {
        width: 90%;
        display: flex;
        flex-direction: column;
        line-height: 1.8em;

    }

    input {
        margin: 0px 0px 15px;
        border: none;
        border: none;
        color: gray;
        outline: none;
    }

    input:focus {
        border: none;
        color: black;

    }

    input:hover {
        filter: brightness(104%);

    }

    #Username {
        width: 100%;
        padding: 1em;
        box-shadow: 0px 1px 0px 0px;


    }

    #password {
        width: 100%;
        padding: 1em;
        box-shadow: 0px 1px 0px 0px;

    }

    #submitBTN {
        margin-top: 10px;
        padding: 0.5em;
        font-size: 1em;
        border-radius: 50px;
        border: none;
        background-image: url('https://media.istockphoto.com/id/959533002/vector/vector-abstract-vibrant-mesh-background-fuchsia-to-blue.jpg?s=612x612&w=0&k=20&c=mHuYrDndzN-rnybrXm6hkILbYRGAd5gM_NSOZ4xRTOM=');
        color: white;
        cursor: pointer;
        font-size: large;
        font-weight: 600;
        filter: brightness(150%);
    }

    #submitBTN:hover {
        transition: filter 0.5s ease;
        filter: brightness(190%);
    }

    .optionCT {
        width: 480px;
        height: 90vh;
        display: none;
        flex-direction: column;
        align-items: center;
        padding: 1em;
        background-color: rgba(255, 255, 255, 0.925);
        backdrop-filter: blur(10px);
        border-radius: 42px;
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
        box-shadow: 0px 0px 10px 0px black;
        font-family: Arial, Helvetica, sans-serif;

    }

    .choice {
        font-weight: 100;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 1em;
    }

    #UChoice {
        width: 80%;
        box-shadow: 0px 1px 0px 0px;
    }

    .options {
        position: absolute;
        left: 15%;
        top: 20%;
        align-self: flex-start;
    }

    li {
        padding: 5px;
    }
</style>

<body>
    <div class="loginCT">
        <h1>User Login</h1>

        <form action="bankProgramm.html" autocomplete="off">
            <p>Bitte Name und Passwort eingeben</p>
            <label for="username">Username</label>
            <input type="text" id="Username" placeholder="username" value="">

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="password" value="">


            <input type="submit" id="submitBTN" value="Login">
            <p class="sucess">test</p>
        </form>
    </div>

    <div class="optionCT">
        <h1 class="choice"></h1>
        <input type="text" id="UChoice" placeholder="choice?">
        <ul class="options">
            <li>Einzahlung</li>
            <li>Abhebung</li>
            <li>Kontostand prüfen</li>
            <li>Passwort ändern</li>
            <li>Programm abbrechen</li>
        </ul>
    </div>

    <script>


        const submit = document.getElementById('submitBTN').addEventListener('click', function (event) {
            event.preventDefault()
            saveUserData()

        })

        const login = document.querySelector('.loginCT');
        const user = document.getElementById('Username');
        const password = document.getElementById('password');


        const option = document.querySelector('.optionCT');
        const choice = document.querySelector('.choice');


        function saveUserData() {
            let Uvalue = user.value;
            let Pvalue = password.value;

            let getUser = localStorage.getItem('Username');
            let getPsw = localStorage.getItem('Password');

            if (getUser && getPsw) {
                checkAcces(Uvalue, Pvalue)
                console.log('checked')
                clear()



                return
            } else {
                let username = localStorage.setItem('Username', Uvalue)
                let psw = localStorage.setItem('Password', Pvalue)

                document.querySelector('.sucess').textContent = 'saved'
                clear()
            }




        }

        function checkAcces(user, password) {
            let sucess = document.querySelector('.sucess')

            let getUser = localStorage.getItem('Username');
            let getPsw = localStorage.getItem('Password');

            if (user == getUser && password == getPsw) {
                console.log(getUser)
                console.log(getPsw)

                sucess.textContent = 'access'
                console.log(sucess)
                hide()

                choice.textContent = `Hallo ${user} was möchtest du heute erledigen?`

            } else if (user !== getUser && password !== getPsw) {
                console.log(user)
                console.log(password)

                sucess.textContent = 'no acess'
            }


        }

        function hide() {
            login.style.display = 'none';
            option.style.display = 'block'

        }

        function clear() {
            user.value = '';
            password.value = '';
        }

        function catchError() {
            console.log()
        }

    </script>
</body>

</html>
